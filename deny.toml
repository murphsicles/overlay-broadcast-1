# cargo-deny configuration (REQ-GOV-032). Licenses, advisories, sources, and crate
# bans. The source-token banned-list (chain/asset identifiers, tool identity) is
# enforced separately and authoritatively by `cargo run -p xtask -- banned-tokens`
# (REQ-UNI-005, REQ-GOV-071).
[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[advisories]
yanked = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
